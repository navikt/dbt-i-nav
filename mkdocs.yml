        - Lagdeling: 'dbt-kodestandard/lagdeling.md'
        - Grain: 'dbt-kodestandard/grain.md'
        - Navnestandard: 'dbt-kodestandard/navnestandard.md'
        - Mappe- og prosjektstruktur: 'dbt-kodestandard/struktur.md'
      - SQL og kode standarder:
        - Konvensjoner: 'dbt-kodestandard/konvensjoner.md'
        - JOIN-strategi: 'dbt-kodestandard/JOINstrategi.md'
        - SQLFluff: 'dbt-kodestandard/SQLFluff.md'
        - Kommentarer: 'dbt-kodestandard/kommentarer.md'
      - Testing og dokumentasjon:
        - Teststrategi: 'dbt-kodestandard/teststrategi.md'
        - Dokumentasjonsstandard: 'dbt-kodestandard/dokumentasjonsstandard.md'
      - Historikk og avhengigheter:
        - Historikk: 'dbt-kodestandard/historikk.md'
        - Incremental og Volum: 'dbt-kodestandard/incrementalOgVolum.md'
        - One Big Table: 'dbt-kodestandard/OBT.md'
        - Avhengigheter: 'dbt-kodestandard/avhengigheter.md'

      - Drift og stabilitet:
        - Modellkontrakter: 'dbt-kodestandard/modellkontrakter.md'
        - Feilhåndtering: 'dbt-kodestandard/feilhåndtering.md'
        - Ytelse: 'dbt-kodestandard/ytelse.md'
      - Prosess og verktøy:
        - Versjonskontroll: 'dbt-kodestandard/versjonskontroll.md'
        - CI: 'dbt-kodestandard/CI.md'
        - Eksempler: 'dbt-kodestandard/eksempler.md'
  - God praksis:
      - Materialiseringsstrategier: arkitektur/materialisering.md
      - Navnestandard og stilguide: arkitektur/style_guide.md
      - Testoppsett: arkitektur/testing.md
      - SQL-formattering med SQLFluff: arkitektur/sqlfluff.md
      - Eksempel - Team Spenn: arkitektur/materialisering_spenn.md
  - Dokumentasjon:
      - dokumentasjon/index.md
      - dokumentasjon/dokumentasjon.md
      - dokumentasjon/overview.md
  - Prosjekter som bruker dbt:
      - prosjekter/index.md
      - prosjekter/dvh_arb_cv.md
      - prosjekter/dvh_arb_permittering.md
      - prosjekter/dvh_arb_person.md
      - prosjekter/dvh_arb_tiltak.md
      - prosjekter/dvh_arb_styrke_ssb.md
      - prosjekter/dvh-sykefravar-dmx.md
      - prosjekter/nystol/vdl-regnskapsdata.md
      - prosjekter/bomlo-dbt.md
  - Arkiv:
      - Eldre Knast-sider:
        - arkiv/knast/Hva-er-Knast.md
        - arkiv/knast/kjøre-regler.md
        - arkiv/knast/SQL-developer.md
        - arkiv/knast/installer-python-pakker.md
        - arkiv/knast/dbt-power-user.md
        - arkiv/knast/KSM-brukerguide.md
        - arkiv/knast/Github-i-Knast.md
      - VDI oppsett:
        - arkiv/vdi/Installasjon-på-VDI/installere.md
        - arkiv/vdi/Installasjon-på-VDI/python.md
        - arkiv/vdi/Installasjon-på-VDI/oracle-client-library.md
        - arkiv/vdi/Installasjon-på-VDI/pip-og-oppsett.md
        - arkiv/vdi/Installasjon-på-VDI/git.md
        - arkiv/vdi/Installasjon-på-VDI/miljovariabler.md
        - arkiv/vdi/Installasjon-på-VDI/vscode.md
        - arkiv/vdi/Installasjon-på-VDI/dbt-power-user.md
        - arkiv/vdi/Installasjon-på-VDI/sqlfluff.md
        - arkiv/vdi/feilsoking/feilsoking.md
        - arkiv/vdi/Installasjon-på-VDI/dbt.md
  - Airflow:
      - airflow og dbt_run/airflow.md
      - airflow og dbt_run/dbt_operator.md
      - airflow og dbt_run/dbt_run.md

theme:
  name: material
  font:
    text: Inter
    code: JetBrains Mono
  palette:
    - media: "(prefers-color-scheme: light)"
      primary: custom
      scheme: default
      toggle:
        icon: material/toggle-switch-off-outline
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      primary: custom
      scheme: slate
      toggle:
        icon: material/toggle-switch
        name: Switch to light mode
  features:
    - navigation.tracking
    - navigation.indexes
    - toc.follow

markdown_extensions:
  - def_list
  - pymdownx.tasklist:
      custom_checkbox: true
  - admonition
  - toc:
      permalink: true
      toc_depth: 2
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js
  - javascripts/mermaid-init.js

plugins:
  - search
  - git-revision-date-localized
